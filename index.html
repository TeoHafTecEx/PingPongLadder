<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0c0c10"/>
<title>Table Tennis Ladder</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c10;
  --bg2:#111118;
  --bg3:#18181f;
  --surface:rgba(255,255,255,0.05);
  --surface2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.09);
  --border2:rgba(255,255,255,0.16);
  --text:#f0f0f4;
  --muted:#8b8b9e;
  --subtle:#5a5a70;
  --gold:#f5c842;
  --silver:#b0bec5;
  --bronze:#cd7f32;
  --accent:#7c6af0;
  --accent2:#c084fc;
  --green:#22d3a0;
  --red:#f87171;
  --orange:#fb923c;
  --nav:64px;
  --r:14px;
  --r2:10px;
  --max:860px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{background:
  radial-gradient(ellipse 60% 40% at 0% 0%,rgba(124,106,240,.15),transparent),
  radial-gradient(ellipse 50% 35% at 100% 100%,rgba(192,132,252,.1),transparent),
  var(--bg);min-height:100dvh}
a{color:inherit;text-decoration:none}
p{color:var(--muted);line-height:1.6}
h1{font-size:clamp(20px,4vw,32px);font-weight:800;letter-spacing:-0.03em}
h2{font-size:18px;font-weight:700;letter-spacing:-0.02em}
h3{font-size:15px;font-weight:700}
.mono{font-family:'JetBrains Mono',monospace}
.container{max-width:var(--max);margin:0 auto;padding:20px 16px calc(var(--nav)+24px)}
.hide{display:none!important}

/* ── HEADER ── */
.page-header{padding:28px 16px 8px;max-width:var(--max);margin:0 auto}
.page-header h1{background:linear-gradient(135deg,var(--text) 0%,var(--muted) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-header .sub{font-size:13px;color:var(--subtle);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.08em}

/* ── TABS ── */
.tabs{display:flex;gap:2px;padding:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:20px}
.tab-btn{flex:1;padding:9px 8px;border-radius:9px;border:none;background:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card-sm{padding:12px 14px}

/* ── LEADERBOARD ── */
#leaderboard-view{display:flex;flex-direction:column;gap:8px}
.player-card{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:border-color .2s,transform .15s;cursor:default;position:relative;overflow:hidden}
.player-card::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:0;background:linear-gradient(90deg,rgba(124,106,240,.06),transparent);transition:opacity .2s}
.player-card:hover::before{opacity:1}
.player-card:hover{border-color:var(--border2);transform:translateX(2px)}
.player-card.rank-1{border-color:rgba(245,200,66,.25);background:linear-gradient(90deg,rgba(245,200,66,.07),var(--surface))}
.player-card.rank-2{border-color:rgba(176,190,197,.18)}
.player-card.rank-3{border-color:rgba(205,127,50,.18)}
.rank-badge{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:16px;font-weight:800;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;font-family:'JetBrains Mono',monospace}
.rank-badge.gold{background:rgba(245,200,66,.12);border-color:rgba(245,200,66,.3);color:var(--gold)}
.rank-badge.silver{background:rgba(176,190,197,.1);border-color:rgba(176,190,197,.25);color:var(--silver)}
.rank-badge.bronze{background:rgba(205,127,50,.1);border-color:rgba(205,127,50,.25);color:var(--bronze)}
.player-info{min-width:0}
.player-name{font-size:15px;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.meta-pill{font-size:11px;color:var(--subtle);background:var(--bg3);padding:2px 7px;border-radius:20px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.meta-pill.win{color:var(--green);border-color:rgba(34,211,160,.2);background:rgba(34,211,160,.06)}
.meta-pill.loss{color:var(--red);border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.06)}
.meta-pill.streak-pos{color:var(--green)}
.meta-pill.streak-neg{color:var(--red)}
.player-stats{text-align:right;flex-shrink:0}
.win-pct{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--text)}
.win-pct-label{font-size:10px;color:var(--subtle);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.rank-delta{font-size:11px;font-weight:700;margin-top:2px}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}

/* ── SECTION LABEL ── */
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--subtle);font-weight:600;margin-bottom:10px;margin-top:20px}

/* ── ADD MATCH ── */
.match-form{display:flex;flex-direction:column;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle);font-weight:600}
select,input[type=text]{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .15s;cursor:pointer}
select:focus,input:focus{border-color:var(--accent)}
select option{background:#18181f;color:#f0f0f4}
.scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.score-card{padding:16px;text-align:center;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);transition:border-color .2s,background .2s}
.score-card.winner{border-color:rgba(34,211,160,.35);background:rgba(34,211,160,.06)}
.score-card.loser{opacity:.6}
.score-role{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--subtle);font-weight:600;margin-bottom:6px}
.score-name{font-size:14px;font-weight:700;margin-bottom:12px;min-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-num{font-size:48px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;margin:8px 0}
.score-controls{display:flex;gap:8px;justify-content:center;margin-top:8px}
.score-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:'Syne',sans-serif}
.score-btn:hover{background:var(--border2);transform:scale(1.07)}
.score-btn:active{transform:scale(.95)}
.score-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.winner-badge{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;opacity:0;transition:opacity .2s}
.winner-badge.show{opacity:1}
.match-summary{padding:14px;border-radius:var(--r2);background:rgba(124,106,240,.08);border:1px solid rgba(124,106,240,.2);font-size:14px;line-height:1.5}
.match-summary strong{color:var(--text)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--r2);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.1)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent);border-color:rgba(124,106,240,.5);color:#fff}
.btn-primary:hover{background:#9180f5;border-color:rgba(124,106,240,.7)}
.btn-danger{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.3);color:var(--red)}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn-full{width:100%}

/* ── MATCHES LIST ── */
#matches-list{display:flex;flex-direction:column;gap:8px}
.match-item{padding:14px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.match-players{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;flex-wrap:wrap}
.match-vs{color:var(--subtle);font-size:11px;font-weight:600}
.match-winner-name{color:var(--green)}
.match-loser-name{color:var(--muted)}
.match-meta{font-size:11px;color:var(--subtle);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.match-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;font-family:'JetBrains Mono',monospace}
.match-badge.swap{background:rgba(34,211,160,.1);color:var(--green);border:1px solid rgba(34,211,160,.2)}
.match-badge.push{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2)}
.match-badge.none{background:var(--bg3);color:var(--subtle);border:1px solid var(--border)}
.match-badge.challenge-up{background:rgba(124,106,240,.1);color:var(--accent2);border:1px solid rgba(124,106,240,.2)}
.match-badge.invalid{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.match-score{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text);white-space:nowrap}
.match-date{font-size:11px;color:var(--subtle);font-family:'JetBrains Mono',monospace;margin-top:2px;text-align:right}
.delete-match-btn{opacity:0;transition:opacity .15s;cursor:pointer;color:var(--red);font-size:16px;padding:2px 4px;background:none;border:none;font-family:monospace}
.match-item:hover .delete-match-btn{opacity:.6}
.delete-match-btn:hover{opacity:1!important}

/* ── AWARDS ── */
#awards-list{display:flex;flex-direction:column;gap:12px}
.award-card{display:flex;align-items:center;gap:16px;padding:16px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface)}
.award-icon{font-size:32px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--bg3);border:1px solid var(--border);flex-shrink:0}
.award-body{min-width:0}
.award-title{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle);font-weight:600;margin-bottom:2px}
.award-name{font-size:17px;font-weight:800;letter-spacing:-0.01em}
.award-detail{font-size:12px;color:var(--muted);margin-top:2px}
.award-card.gold-award{border-color:rgba(245,200,66,.3);background:linear-gradient(90deg,rgba(245,200,66,.06),var(--surface))}

/* ── RULES ── */
.rule-section{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.rule-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--surface);transition:background .15s}
.rule-header:hover{background:var(--surface2)}
.rule-header h3{font-size:14px;font-weight:700}
.rule-chevron{color:var(--subtle);font-size:16px;transition:transform .2s;display:inline-block}
.rule-section.open .rule-chevron{transform:rotate(180deg)}
.rule-body{display:none;padding:16px;border-top:1px solid var(--border);background:var(--bg2);line-height:1.7;font-size:14px;color:var(--muted)}
.rule-section.open .rule-body{display:block}
.rule-body p{margin-bottom:10px;color:var(--muted)}
.rule-body p:last-child{margin-bottom:0}
.rule-body ul{padding-left:18px}
.rule-body ul li{margin-bottom:6px;color:var(--muted)}
.rule-body strong{color:var(--text);font-weight:700}
.rule-example{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px;margin-top:10px;font-size:13px}

/* ── ADMIN ── */
.admin-section{margin-bottom:20px}
.pin-form{display:flex;gap:8px;align-items:flex-end}
.pin-form input{flex:1}
.players-manager{display:flex;flex-direction:column;gap:8px}
.player-admin-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r2);background:var(--bg3);border:1px solid var(--border)}
.player-admin-rank{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--subtle);width:28px;text-align:center;flex-shrink:0}
.player-admin-name{flex:1;font-size:14px;font-weight:600}
.player-admin-actions{display:flex;gap:6px;flex-shrink:0}
.add-player-row{display:flex;gap:8px}
.add-player-row input{flex:1}

/* ── STATS MINI BAR ── */
.stat-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-box{text-align:center;padding:12px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2)}
.stat-num{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--text)}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle);margin-top:2px}

/* ── TOAST ── */
#toast-host{position:fixed;right:14px;bottom:calc(var(--nav)+16px);display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none}
.toast{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(18,18,26,.9);backdrop-filter:blur(12px);color:var(--text);font-size:13px;font-weight:600;max-width:300px;pointer-events:auto;cursor:pointer;transition:opacity .2s,transform .2s;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.toast.success{border-color:rgba(34,211,160,.35)}
.toast.error{border-color:rgba(248,113,113,.4)}
.toast.warn{border-color:rgba(251,146,60,.4)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);width:min(600px,calc(100% - 20px));height:var(--nav);background:rgba(12,12,18,.85);border:1px solid var(--border2);border-radius:18px;backdrop-filter:blur(16px);display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px;z-index:1000}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:12px;color:var(--subtle);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:all .15s;padding:4px 2px;border:1px solid transparent;user-select:none}
.nav-item:hover{color:var(--muted);background:var(--surface)}
.nav-item.active{color:var(--text);background:rgba(124,106,240,.18);border-color:rgba(124,106,240,.3)}
.nav-item .nav-icon{font-size:18px;line-height:1}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--subtle)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:14px;color:var(--subtle)}

/* ── CONFIRM MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:24px;max-width:360px;width:100%}
.modal-box h3{margin-bottom:8px}
.modal-box p{font-size:14px;margin-bottom:20px}
.modal-actions{display:flex;gap:10px}
.modal-actions .btn{flex:1}

/* ── CHALLENGE HINT ── */
.challenge-hint{font-size:12px;padding:8px 12px;border-radius:8px;margin-top:-6px}
.hint-ok{background:rgba(34,211,160,.08);border:1px solid rgba(34,211,160,.2);color:var(--green)}
.hint-warn{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2);color:var(--orange)}
.hint-err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red)}

/* ── SEARCH ── */
.search-bar{position:relative;margin-bottom:16px}
.search-bar input{padding-left:36px}
.search-bar::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .scoreboard{grid-template-columns:1fr}
  .stat-bar{grid-template-columns:repeat(3,1fr)}
  .player-card{grid-template-columns:38px 1fr auto;gap:8px}
  .score-num{font-size:36px}
}
</style>
</head>
<body>

<div id="app">
  <!-- Pages injected here -->
</div>

<nav class="bottom-nav">
  <div class="nav-item active" data-page="leaderboard" onclick="navigate('leaderboard')">
    <span class="nav-icon">📊</span><span>Ladder</span>
  </div>
  <div class="nav-item" data-page="add-match" onclick="navigate('add-match')">
    <span class="nav-icon">➕</span><span>Match</span>
  </div>
  <div class="nav-item" data-page="matches" onclick="navigate('matches')">
    <span class="nav-icon">🕑</span><span>History</span>
  </div>
  <div class="nav-item" data-page="awards" onclick="navigate('awards')">
    <span class="nav-icon">🏆</span><span>Awards</span>
  </div>
  <div class="nav-item" data-page="rules" onclick="navigate('rules')">
    <span class="nav-icon">📖</span><span>Rules</span>
  </div>
</nav>

<div id="toast-host"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const STORE_KEY = 'tt_ladder_v2';
const ADMIN_PIN_KEY = 'tt_admin_pin';

function defaultState() {
  return {
    leagueName: 'Complex Solutions',
    players: [],
    matches: [],
    nextMatchId: 1,
  };
}

let state = defaultState();
let currentPage = 'leaderboard';
let adminUnlocked = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = { ...defaultState(), ...parsed };
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function getAdminPin() {
  return localStorage.getItem(ADMIN_PIN_KEY) || '';
}
function setAdminPin(pin) {
  if (pin) localStorage.setItem(ADMIN_PIN_KEY, pin);
  else localStorage.removeItem(ADMIN_PIN_KEY);
}

/* ═══════════════════════════════════════════
   LADDER LOGIC
═══════════════════════════════════════════ */
function getRankedPlayers() {
  return [...state.players].sort((a,b) => a.rank - b.rank);
}

function getPlayerByName(name) {
  return state.players.find(p => p.name === name);
}

function computeAllowed(challengerRank, defenderRank) {
  const upDist = challengerRank - defenderRank;
  const downDist = defenderRank - challengerRank;
  const upwardAllowed = upDist >= 1 && upDist <= 2;
  const downwardAllowed = downDist === 1;
  return {
    allowed: upwardAllowed || downwardAllowed,
    direction: upwardAllowed ? 'up' : (downwardAllowed ? 'down' : 'none'),
    distance: upwardAllowed ? upDist : (downwardAllowed ? -downDist : 0)
  };
}

function applyMatchToLadder(challengerName, defenderName, winner) {
  const cPlayer = getPlayerByName(challengerName);
  const dPlayer = getPlayerByName(defenderName);
  if (!cPlayer || !dPlayer) return 'none';

  const cRank = cPlayer.rank;
  const dRank = dPlayer.rank;
  const rule = computeAllowed(cRank, dRank);

  let movement = 'none';

  if (rule.allowed) {
    if (rule.direction === 'up' && winner === challengerName) {
      movement = 'swap';
      swapRanks(challengerName, defenderName);
    } else if (rule.direction === 'down') {
      if (winner === challengerName) {
        movement = 'push';
        pushDown(defenderName);
      } else if (winner === defenderName) {
        movement = 'swap';
        swapRanks(challengerName, defenderName);
      }
    }
  }

  return movement;
}

function swapRanks(nameA, nameB) {
  const a = getPlayerByName(nameA);
  const b = getPlayerByName(nameB);
  if (!a || !b) return;
  const tmp = a.rank;
  a.rank = b.rank;
  b.rank = tmp;
}

function pushDown(defenderName) {
  const defender = getPlayerByName(defenderName);
  if (!defender) return;
  const belowRank = defender.rank + 1;
  const below = state.players.find(p => p.rank === belowRank);
  if (below) {
    below.rank = defender.rank;
  }
  defender.rank = belowRank;
}

function recomputeStats() {
  // Reset all
  for (const p of state.players) {
    p.wins = 0;
    p.losses = 0;
    p.streak = 0;
    p.lastPlayed = null;
    p.matchCount = 0;
  }
  const sorted = [...state.matches].sort((a,b) => new Date(a.date) - new Date(b.date));
  for (const m of sorted) {
    const c = getPlayerByName(m.challenger);
    const d = getPlayerByName(m.defender);
    if (!c || !d) continue;
    const cWon = m.winner === m.challenger;
    // challenger
    if (cWon) { c.wins++; c.streak = c.streak > 0 ? c.streak+1 : 1; }
    else { c.losses++; c.streak = c.streak < 0 ? c.streak-1 : -1; }
    c.matchCount = (c.matchCount||0)+1;
    c.lastPlayed = m.date;
    // defender
    if (!cWon) { d.wins++; d.streak = d.streak > 0 ? d.streak+1 : 1; }
    else { d.losses++; d.streak = d.streak < 0 ? d.streak-1 : -1; }
    d.matchCount = (d.matchCount||0)+1;
    d.lastPlayed = m.date;
  }
}

function winPct(p) {
  const total = (p.wins||0)+(p.losses||0);
  if (!total) return '—';
  return Math.round((p.wins/total)*100)+'%';
}

function submitMatch(challenger, defender, cScore, dScore) {
  if (!challenger || !defender || challenger === defender) {
    toast('Select two different players.', 'error'); return false;
  }
  const cP = getPlayerByName(challenger);
  const dP = getPlayerByName(defender);
  if (!cP || !dP) { toast('Player not found.', 'error'); return false; }

  const winner = cScore >= 2 ? challenger : defender;
  const score = `${cScore}-${dScore}`;
  const rule = computeAllowed(cP.rank, dP.rank);
  const date = new Date().toISOString();

  const movement = applyMatchToLadder(challenger, defender, winner);

  const match = {
    id: state.nextMatchId++,
    date,
    challenger,
    defender,
    winner,
    score,
    allowed: rule.allowed,
    direction: rule.direction,
    movement,
    distance: rule.distance
  };

  state.matches.unshift(match);
  recomputeStats();
  saveState();
  return match;
}

/* ═══════════════════════════════════════════
   PLAYER MANAGEMENT
═══════════════════════════════════════════ */
function addPlayer(name) {
  const clean = name.trim();
  if (!clean) { toast('Enter a name.', 'error'); return false; }
  if (state.players.find(p => p.name.toLowerCase() === clean.toLowerCase())) {
    toast('Player already exists.', 'error'); return false;
  }
  const maxRank = state.players.reduce((m,p) => Math.max(m, p.rank), 0);
  state.players.push({
    name: clean,
    rank: maxRank + 1,
    wins: 0, losses: 0, streak: 0, matchCount: 0, lastPlayed: null
  });
  saveState();
  toast(`${clean} added to ladder.`, 'success');
  return true;
}

function removePlayer(name) {
  state.players = state.players.filter(p => p.name !== name);
  // Remove their matches
  state.matches = state.matches.filter(m => m.challenger !== name && m.defender !== name);
  // Re-rank remaining
  const sorted = [...state.players].sort((a,b) => a.rank - b.rank);
  sorted.forEach((p,i) => { p.rank = i+1; });
  recomputeStats();
  saveState();
}

function movePlayerUp(name) {
  const p = getPlayerByName(name);
  if (!p || p.rank <= 1) return;
  const above = state.players.find(q => q.rank === p.rank-1);
  if (above) { above.rank = p.rank; p.rank--; }
  saveState();
}

function movePlayerDown(name) {
  const p = getPlayerByName(name);
  const maxR = state.players.reduce((m,q) => Math.max(m, q.rank), 0);
  if (!p || p.rank >= maxR) return;
  const below = state.players.find(q => q.rank === p.rank+1);
  if (below) { below.rank = p.rank; p.rank++; }
  saveState();
}

function deleteMatch(id) {
  state.matches = state.matches.filter(m => m.id !== id);
  // Full replay of ladder from scratch is complex; just recompute stats
  recomputeStats();
  saveState();
}

/* ═══════════════════════════════════════════
   AWARDS
═══════════════════════════════════════════ */
function computeAwards() {
  const ps = state.players;
  const ms = state.matches;
  if (!ps.length) return [];
  const awards = [];

  // Ladder champion
  const champ = getRankedPlayers()[0];
  if (champ) awards.push({ icon:'🥇', title:'Ladder Champion', name: champ.name, detail:`Rank #1 with ${champ.wins}W / ${champ.losses}L`, gold:true });

  // Most wins
  const mostWins = [...ps].sort((a,b) => b.wins - a.wins)[0];
  if (mostWins && mostWins.wins > 0) awards.push({ icon:'🎯', title:'Top Scorer', name: mostWins.name, detail:`${mostWins.wins} wins total` });

  // Best streak
  const bestStreak = [...ps].sort((a,b) => b.streak - a.streak)[0];
  if (bestStreak && bestStreak.streak > 0) awards.push({ icon:'🔥', title:'On Fire', name: bestStreak.name, detail:`${bestStreak.streak} win streak` });

  // Most active
  const mostActive = [...ps].sort((a,b) => (b.matchCount||0) - (a.matchCount||0))[0];
  if (mostActive && (mostActive.matchCount||0) > 0) awards.push({ icon:'⚡', title:'Most Active', name: mostActive.name, detail:`${mostActive.matchCount} matches played` });

  // Giant Killer: most wins against higher-ranked players (at time of match — approx: challenger wins against defender who was ranked higher = lower rank number)
  const giantKills = {};
  for (const m of ms) {
    if (!m.allowed || m.direction !== 'up' || m.winner !== m.challenger) continue;
    giantKills[m.winner] = (giantKills[m.winner]||0) + 1;
  }
  const topGiant = Object.entries(giantKills).sort((a,b) => b[1]-a[1])[0];
  if (topGiant) awards.push({ icon:'🗡️', title:'Giant Killer', name: topGiant[0], detail:`${topGiant[1]} upsets against higher-ranked` });

  // Best Win%
  const withGames = ps.filter(p => (p.wins+p.losses) >= 3);
  if (withGames.length) {
    const bestPct = withGames.sort((a,b) => (b.wins/(b.wins+b.losses)) - (a.wins/(a.wins+a.losses)))[0];
    awards.push({ icon:'📈', title:'Best Win Rate', name: bestPct.name, detail:`${winPct(bestPct)} (min 3 games)` });
  }

  return awards;
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function toast(msg, type='info', dur=3000) {
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  el.onclick = () => el.remove();
  host.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transform='translateY(6px)'; setTimeout(()=>el.remove(),200); }, dur);
}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
function showModal(title, msg, onConfirm, confirmText='Delete', danger=true) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>${title}</h3>
      <p>${msg}</p>
      <div class="modal-actions">
        <button class="btn" id="modal-cancel">Cancel</button>
        <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="modal-confirm">${confirmText}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-cancel').onclick = () => overlay.remove();
  overlay.querySelector('#modal-confirm').onclick = () => { overlay.remove(); onConfirm(); };
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  renderPage();
}

function renderPage() {
  const app = document.getElementById('app');
  switch(currentPage) {
    case 'leaderboard': app.innerHTML = renderLeaderboard(); initLeaderboard(); break;
    case 'add-match':   app.innerHTML = renderAddMatch();    initAddMatch();    break;
    case 'matches':     app.innerHTML = renderMatches();     initMatches();     break;
    case 'awards':      app.innerHTML = renderAwards();                         break;
    case 'rules':       app.innerHTML = renderRules();       initRules();       break;
    default:            app.innerHTML = renderLeaderboard(); initLeaderboard(); break;
  }
}

function initAddMatch() {
  const cSel = document.getElementById('challenger-select');
  const dSel = document.getElementById('defender-select');
  if (!cSel || !dSel) return;

  let cScore = 0, dScore = 0, finished = false;

  function updateNames() {
    const cName = document.getElementById('c-name');
    const dName = document.getElementById('d-name');
    if (cName) cName.textContent = cSel.value;
    if (dName) dName.textContent = dSel.value;
    updateChallengeHint();
    resetScores();
  }

  function updateChallengeHint() {
    const hint = document.getElementById('challenge-hint');
    if (!hint) return;
    const c = getPlayerByName(cSel.value);
    const d = getPlayerByName(dSel.value);
    if (!c || !d || c.name === d.name) { hint.innerHTML = ''; return; }
    const rule = computeAllowed(c.rank, d.rank);
    if (rule.allowed) {
      const dir = rule.direction === 'up' ? `challenging up ${rule.distance} rank(s)` : `push-down challenge`;
      hint.innerHTML = `<div class="challenge-hint hint-ok">✓ Valid: ${escHtml(c.name)} is ${dir} against ${escHtml(d.name)}</div>`;
    } else {
      const upDist = c.rank - d.rank;
      const downDist = d.rank - c.rank;
      let msg = '';
      if (upDist > 2) msg = `too far above (${upDist} ranks, max 2)`;
      else if (downDist > 1) msg = `too far below (${downDist} ranks, push-down max 1)`;
      else msg = 'invalid matchup';
      hint.innerHTML = `<div class="challenge-hint hint-err">✗ Invalid challenge: ${escHtml(c.name)} vs ${escHtml(d.name)} — ${msg}. Match will still be recorded.</div>`;
    }
  }

  function resetScores() {
    cScore = 0; dScore = 0; finished = false;
    setScore('c', 0); setScore('d', 0);
    document.getElementById('c-winner')?.classList.remove('show');
    document.getElementById('d-winner')?.classList.remove('show');
    document.getElementById('c-card')?.classList.remove('winner','loser');
    document.getElementById('d-card')?.classList.remove('winner','loser');
    document.getElementById('match-summary')?.classList.add('hide');
    document.getElementById('confirm-btn')?.classList.add('hide');
    setScoreBtnsDisabled(false);
  }

  window.resetMatchForm = resetScores;

  function setScore(who, val) {
    const el = document.getElementById(`${who}-score`);
    if (el) el.textContent = val;
  }

  function setScoreBtnsDisabled(dis) {
    ['c-plus','c-minus','d-plus','d-minus'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = dis;
    });
  }

  function checkWinner() {
    document.getElementById('c-winner')?.classList.toggle('show', cScore >= 2);
    document.getElementById('d-winner')?.classList.toggle('show', dScore >= 2);

    if (cScore >= 2 || dScore >= 2) {
      finished = true;
      setScoreBtnsDisabled(true);
      const winName = cScore >= 2 ? cSel.value : dSel.value;
      const loseName = cScore >= 2 ? dSel.value : cSel.value;
      document.getElementById('c-card')?.classList.toggle('winner', cScore >= 2);
      document.getElementById('c-card')?.classList.toggle('loser', cScore < 2);
      document.getElementById('d-card')?.classList.toggle('winner', dScore >= 2);
      document.getElementById('d-card')?.classList.toggle('loser', dScore < 2);

      const c = getPlayerByName(cSel.value);
      const d = getPlayerByName(dSel.value);
      const rule = c && d ? computeAllowed(c.rank, d.rank) : null;
      let movementHint = '';
      if (rule && rule.allowed) {
        if (rule.direction === 'up' && winName === cSel.value) movementHint = `<br>📈 Ladder swap: ${escHtml(winName)} moves up to #${d.rank}`;
        else if (rule.direction === 'down' && winName === cSel.value) movementHint = `<br>⬇️ Push-down: ${escHtml(loseName)} drops a rank`;
        else if (rule.direction === 'down' && winName === dSel.value) movementHint = `<br>↕️ Swap: ${escHtml(winName)} moves up`;
      }

      const summary = document.getElementById('match-summary');
      if (summary) {
        summary.className = 'match-summary';
        summary.innerHTML = `<strong>${escHtml(winName)}</strong> wins ${cScore}–${dScore}.${movementHint}`;
      }
      document.getElementById('confirm-btn')?.classList.remove('hide');
    } else {
      finished = false;
      document.getElementById('c-card')?.classList.remove('winner','loser');
      document.getElementById('d-card')?.classList.remove('winner','loser');
      document.getElementById('match-summary')?.classList.add('hide');
      document.getElementById('confirm-btn')?.classList.add('hide');
    }
  }

  function addPoint(who) {
    if (finished) return;
    if (who === 'c') { if (cScore >= 2) return; cScore++; setScore('c', cScore); }
    else { if (dScore >= 2) return; dScore++; setScore('d', dScore); }
    checkWinner();
  }

  function removePoint(who) {
    if (finished) return;
    if (who === 'c') { cScore = Math.max(0, cScore-1); setScore('c', cScore); }
    else { dScore = Math.max(0, dScore-1); setScore('d', dScore); }
    checkWinner();
  }

  document.getElementById('c-plus')?.addEventListener('click', () => addPoint('c'));
  document.getElementById('c-minus')?.addEventListener('click', () => removePoint('c'));
  document.getElementById('d-plus')?.addEventListener('click', () => addPoint('d'));
  document.getElementById('d-minus')?.addEventListener('click', () => removePoint('d'));

  cSel.addEventListener('change', () => {
    if (cSel.value === dSel.value) {
      const others = getRankedPlayers().filter(p => p.name !== cSel.value);
      if (others.length) dSel.value = others[0].name;
    }
    updateNames();
  });
  dSel.addEventListener('change', updateNames);

  document.getElementById('confirm-btn')?.addEventListener('click', () => {
    if (!finished) return;
    const btn = document.getElementById('confirm-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const result = submitMatch(cSel.value, dSel.value, cScore, dScore);
    if (result) {
      toast('Match saved! Ladder updated.', 'success');
      setTimeout(() => navigate('leaderboard'), 800);
    } else {
      btn.disabled = false;
      btn.textContent = '✓ Confirm Match';
    }
  });

  updateNames();
}

/* ═══════════════════════════════════════════
   MATCHES PAGE
═══════════════════════════════════════════ */
function renderMatches() {
  const ms = state.matches;
  return `
  <div class="page-header">
    <h1>Match History</h1>
    <div class="sub">${ms.length} matches recorded</div>
  </div>
  <div class="container">
    <div class="search-bar"><input type="text" id="match-search" placeholder="Search player…"></div>
    <div id="matches-list">
      ${ms.length === 0 ? `<div class="empty-state"><div class="empty-icon">📋</div><p>No matches yet.</p></div>` :
        ms.map(m => renderMatchItem(m)).join('')
      }
    </div>
  </div>`;
}

function renderMatchItem(m) {
  const isWinnerChallenger = m.winner === m.challenger;
  const winName = m.winner;
  const loseName = m.winner === m.challenger ? m.defender : m.challenger;
  const moveBadge = m.movement === 'swap' ? `<span class="match-badge swap">↕ Swap</span>` :
                    m.movement === 'push' ? `<span class="match-badge push">⬇ Push</span>` :
                    m.movement === 'none' ? `<span class="match-badge none">No change</span>` : '';
  const dirBadge = m.allowed
    ? (m.direction === 'up' ? `<span class="match-badge challenge-up">▲ Up</span>` : `<span class="match-badge push">▼ Push-Down</span>`)
    : `<span class="match-badge invalid">⚠ Invalid</span>`;

  return `<div class="match-item" data-id="${m.id}">
    <div>
      <div class="match-players">
        <span class="match-winner-name">${escHtml(winName)}</span>
        <span class="match-vs">def.</span>
        <span class="match-loser-name">${escHtml(loseName)}</span>
      </div>
      <div class="match-meta">
        ${dirBadge}${moveBadge}
        <span style="color:var(--subtle)">${escHtml(m.challenger)} challenged ${escHtml(m.defender)}</span>
      </div>
    </div>
    <div>
      <div class="match-score">${escHtml(m.score)}</div>
      <div class="match-date">${fmtDate(m.date)}</div>
      ${adminUnlocked ? `<button class="delete-match-btn" onclick="deleteMatchAdmin(${m.id})" title="Delete">✕</button>` : ''}
    </div>
  </div>`;
}

function initMatches() {
  const search = document.getElementById('match-search');
  if (search) {
    search.addEventListener('input', () => {
      const q = search.value.toLowerCase().trim();
      document.querySelectorAll('.match-item').forEach(el => {
        el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  }
}

function deleteMatchAdmin(id) {
  showModal('Delete Match', 'Delete this match? Stats will be recalculated, but ladder positions won\'t be reversed.', () => {
    deleteMatch(id);
    navigate('matches');
    toast('Match deleted.', 'success');
  });
}

            <div class="award-detail">${escHtml(a.detail)}</div>

function initRules() {

function toggleRule(header) {

}

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  try {
    return new Date(d).toLocaleDateString(undefined, { day:'numeric', month:'short', year:'numeric' });
  } catch { return String(d||''); }
}

loadState();
